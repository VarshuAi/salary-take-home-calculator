<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Deductions Analyzer — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">💵</span>
                <div class="title-col">
                    <h1>Salary Deductions Analyzer</h1>
                    <p class="tagline">Enter base salaries, deduct tax metrics, and calculate take-home totals.</p>
                </div>
            </div>
            <div class="badge">business</div>
        </header>

        <main class="workspace-card">
            
            <input type="number" id="sal-base" value="75000" placeholder="Gross Annual Salary ($)" style="width: 100%; margin-bottom: 12px;">
            <button class="btn" onclick="calcTax()">Audit Deductions</button>
            <pre id="sal-res" class="out-box" style="margin-top: 16px;"></pre>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
